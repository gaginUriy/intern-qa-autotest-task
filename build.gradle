plugins {
    id 'java'
    id 'io.qameta.allure' version "2.12.0"
}

group = 'testAvito'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    testImplementation("io.rest-assured:rest-assured:5.4.0")
    testImplementation("io.qameta.allure:allure-rest-assured:2.27.0")

    testImplementation("com.codeborne:selenide:7.2.1")
    testImplementation("io.qameta.allure:allure-selenide:2.27.0")

    testImplementation('com.github.javafaker:javafaker:1.0.2')

    implementation 'com.fasterxml.jackson.core:jackson-databind:2.15.2'
    implementation 'com.fasterxml.jackson.core:jackson-core:2.15.2'
    implementation 'com.fasterxml.jackson.core:jackson-annotations:2.15.2'

    testImplementation 'org.assertj:assertj-core:3.24.2'

}

allure {
    version = "2.30.0" // версия Allure CLI
    adapter {
        allureJavaVersion = "2.27.0"
    }
}

test {
    useJUnitPlatform()
}